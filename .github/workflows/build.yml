name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-java-client-build
          path: |
            target/*.jar
            target/docs/**
            target/site/apidocs/**
          if-no-files-found: warn
